name: Build FreeDV Radio Support

on:
  push

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true
    
env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: RelWithDebInfo

  # Work around LLVM apt failure on Ubuntu 22.04
  LLVM_POOL: https://apt.llvm.org/jammy/pool/main/l/llvm-toolchain-21/

jobs:
  build-appimage:
    #needs: lint
    env:
      FREEDV_LINUX_CODE_SIGNING_KEY_ID: ${{ secrets.FREEDV_LINUX_CODE_SIGNING_KEY_ID }}
      LLVM_ARCH: ${{ matrix.os == 'ubuntu-22.04-arm' && 'arm64' || 'amd64' }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04-arm, ubuntu-22.04]
        target: [freedv-ka9q, freedv-flex]

    runs-on: ${{ matrix.os }}

    outputs:
      APPIMAGE_FILENAME: ${{ steps.appimage-filename.outputs.APPIMAGE_FILENAME }}

    steps:
    - uses: actions/checkout@v6

    - name: Install LLVM/Clang >=20.0 
      run: |
        set -euxo pipefail

        # Install the newest version that actually exists in the pool.
        # We derive the exact version string from one known package filename.
        HTML="$(curl -fsSL --compressed "$LLVM_POOL")"
        VER="$(grep -oE 'libllvm21_[0-9][^"]+_${{ env.LLVM_ARCH }}\.deb' <<<"$HTML" | head -n1 \
          | sed -E 's/^libllvm21_//; s/_${{ env.LLVM_ARCH }}\.deb$//')"
        echo "Using pool version: $VER"

        mkdir -p /tmp/llvm21 && cd /tmp/llvm21

        fetch() {
          local pkg="$1"
          local file="${pkg}_${VER}_${{ env.LLVM_ARCH }}.deb"
          curl -fsSLO "${LLVM_POOL}${file}"
        }

        for pkg in \
          clang-21 clang-tools-21 lld-21 \
          libllvm21 libclang-cpp21 libclang-common-21-dev libclang1-21 libclang-rt-21-dev \
          llvm-21 llvm-21-dev llvm-21-linker-tools llvm-21-runtime llvm-21-tools 
        do
          fetch "$pkg"
        done

        # Install the downloaded LLVM debs. apt will resolve any non-LLVM deps from Ubuntu repos.
        sudo apt-get install -y --no-install-recommends ./*.deb
        
    - name: Install rtkit for RT threading
      shell: bash
      run: |
           sudo sed -i 's@http://ports.ubuntu.com/ubuntu-ports@http://mirrors.mit.edu/ubuntu-ports@g' /etc/apt/sources.list
           sudo apt-get update
           sudo apt-get install dbus-x11 rtkit libdbus-1-dev polkitd
           sudo sed -i 's/no/yes/g' /usr/share/polkit-1/actions/org.freedesktop.RealtimeKit1.policy 
           sudo systemctl restart polkit
           
    - name: Install required packages
      shell: bash
      run: |
           sudo apt-get install libpulse-dev sox git libasound2-dev libao-dev libgsm1-dev xvfb pulseaudio pulseaudio-utils metacity at-spi2-core libdbus-1-dev libgtk-3-dev python3 python3-dev python3-venv libebur128-dev pkg-config
           mkdir -p ~/.config/pulse
           echo "default-sample-rate = 48000" >~/.config/pulse/daemon.conf
           sudo sed 's/load-module module-suspend-on-idle/#load-module module-suspend-on-idle/' /etc/pulse/default.pa -i
           systemctl --user --now enable pulseaudio.service pulseaudio.socket

    - name: Set up Docker Buildx
      if: ${{ matrix.target == 'freedv-flex' }}
      uses: docker/setup-buildx-action@v4

    - name: Build target
      shell: bash
      working-directory: ${{github.workspace}}
      run: |
          mkdir build_linux
          cd build_linux
          CC=clang-21 CXX=clang++-21 cmake -DENABLE_LTO=1 -DSTATIC_LIBGCC=1 -DCMAKE_BUILD_TYPE=RelWithDebInfo -DUSE_NATIVE_AUDIO=1 .. 
          make -j$(nproc) ${{ matrix.target }}

    - name: Initialize GPG keys
      if: ${{ env.FREEDV_LINUX_CODE_SIGNING_KEY != '' }}
      env:
        FREEDV_LINUX_CODE_SIGNING_KEY: ${{ secrets.FREEDV_LINUX_CODE_SIGNING_KEY }}
        FREEDV_LINUX_CODE_SIGNING_PUBLIC_KEY: ${{ secrets.FREEDV_LINUX_CODE_SIGNING_PUBLIC_KEY }}
      run: |
        cat <<EOF >tmp_private.pem
        ${{ env.FREEDV_LINUX_CODE_SIGNING_KEY }}
        EOF
        cat <<EOF >tmp_public.pem
        ${{ env.FREEDV_LINUX_CODE_SIGNING_PUBLIC_KEY }}
        EOF
        gpg --import tmp_public.pem
        gpg --import tmp_private.pem

    - name: Build AppImage (unsigned)
      if: ${{ env.FREEDV_LINUX_CODE_SIGNING_KEY == '' }}
      shell: bash
      working-directory: ${{github.workspace}}/appimage
      run: |
          ./make-appimage.sh ${{ matrix.target }}

    - name: Build AppImage (signed)
      if: ${{ env.FREEDV_LINUX_CODE_SIGNING_KEY != '' }}
      shell: bash
      working-directory: ${{github.workspace}}/appimage
      run: |
          LDAI_SIGN=1 LDAI_SIGN_KEY="${{ env.FREEDV_LINUX_CODE_SIGNING_KEY_ID }}" ./make-appimage.sh ${{ matrix.target }}

    - name: Calculate AppImage filename
      shell: bash
      id: appimage-filename
      working-directory: ${{github.workspace}}/appimage
      run: |
          echo "APPIMAGE_FILENAME=$(echo -n FreeDV*.AppImage)" >> "$GITHUB_OUTPUT"

    - name: Generate waveform file
      shell: bash
      working-directory: ${{github.workspace}}/src/integrations/flex
      if: ${{ matrix.target == 'freedv-flex' && matrix.os == 'ubuntu-22.04-arm' }}
      run: |
        cp ${{github.workspace}}/appimage/${{ steps.appimage-filename.outputs.APPIMAGE_FILENAME }} FreeDV-FlexRadio.AppImage
        ./FreeDV-FlexRadio.AppImage --appimage-extract
        ls -lR squashfs-root
        export FREEDV_VERSION=`cat ${{github.workspace}}/build_linux/freedv-version.txt`
        docker buildx build --label com.flexradio.waveform.version=$FREEDV_VERSION --output type=oci,compression=gzip,dest=freedv-waveform-${FREEDV_VERSION}.tar.gz --tag=freedv-waveform .

    - name: Calculate waveform filename
      shell: bash
      id: flex-waveform-filename
      working-directory: ${{github.workspace}}/src/integrations/flex
      run: |
          echo "FLEX_WAVEFORM_FILENAME=$(echo -n freedv-waveform*.tar.gz)" >> "$GITHUB_OUTPUT"

    - name: Upload AppImage
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.appimage-filename.outputs.APPIMAGE_FILENAME }}
        path: ${{github.workspace}}/appimage/${{ steps.appimage-filename.outputs.APPIMAGE_FILENAME }}
        archive: false

    - name: Upload waveform file
      uses: actions/upload-artifact@v7
      if: ${{ matrix.target == 'freedv-flex' && matrix.os == 'ubuntu-22.04-arm' }}
      with:
        name: ${{ steps.flex-waveform-filename.outputs.FLEX_WAVEFORM_FILENAME }}
        path: ${{github.workspace}}/src/integrations/flex/${{ steps.flex-waveform-filename.outputs.FLEX_WAVEFORM_FILENAME }}
        archive: false

